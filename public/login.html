<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatterAI — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600&family=Figtree:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:              oklch(11% 0.01 60);
      --surface:         oklch(16% 0.012 60);
      --surface-hi:      oklch(21% 0.015 60);
      --accent:          oklch(72% 0.18 55);
      --accent-dim:      oklch(55% 0.14 55);
      --text-primary:    oklch(92% 0.008 60);
      --text-secondary:  oklch(60% 0.012 60);
      --text-muted:      oklch(38% 0.01 60);
      --border:          oklch(26% 0.013 60);
      --border-hi:       oklch(36% 0.016 60);
      --font-display:    'Chakra Petch', ui-monospace, monospace;
      --font-body:       'Figtree', ui-sans-serif, system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 32px 24px;
    }

    /* ------------------------------------------------------------------ */
    /* Container */
    /* ------------------------------------------------------------------ */
    .login-wrap {
      width: 100%;
      max-width: 360px;
      position: relative;
    }

    /* Top accent rule */
    .accent-rule {
      height: 2px;
      background: var(--accent);
      margin-bottom: 40px;
    }

    /* ------------------------------------------------------------------ */
    /* Wordmark */
    /* ------------------------------------------------------------------ */
    .wordmark {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-primary);
      margin-bottom: 6px;
      user-select: none;
    }

    .wordmark .accent { color: var(--accent); }

    .tagline {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 44px;
    }

    /* ------------------------------------------------------------------ */
    /* Divider */
    /* ------------------------------------------------------------------ */
    .rule {
      height: 1px;
      background: var(--border);
      margin-bottom: 28px;
    }

    /* ------------------------------------------------------------------ */
    /* Section label */
    /* ------------------------------------------------------------------ */
    .section-label {
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* ------------------------------------------------------------------ */
    /* Google button */
    /* ------------------------------------------------------------------ */
    .btn-google {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      text-align: left;
      line-height: 1;
    }

    .btn-google:hover:not(:disabled) {
      background: var(--surface-hi);
      border-color: var(--border-hi);
    }

    .btn-google:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .btn-google:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-google-label { flex: 1; }

    /* ------------------------------------------------------------------ */
    /* Status line */
    /* ------------------------------------------------------------------ */
    .auth-status {
      height: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      font-family: var(--font-display);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      transition: color 0.15s;
    }

    .auth-status.loading { color: var(--accent); }
    .auth-status.error   { color: oklch(65% 0.2 25); }

    /* ------------------------------------------------------------------ */
    /* Footer */
    /* ------------------------------------------------------------------ */
    .footer-rule { height: 1px; background: var(--border); margin-top: 44px; margin-bottom: 20px; }

    .footer-note {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-display);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ------------------------------------------------------------------ */
    /* Spinner */
    /* ------------------------------------------------------------------ */
    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 1.5px solid var(--border-hi);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.55s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }

    /* ------------------------------------------------------------------ */
    /* Background grid — subtle reference lines */
    /* ------------------------------------------------------------------ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(oklch(22% 0.013 60 / 0.3) 1px, transparent 1px),
        linear-gradient(90deg, oklch(22% 0.013 60 / 0.3) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .login-wrap { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="accent-rule"></div>

    <div class="wordmark">CHATTER<span class="accent">AI</span></div>
    <div class="tagline">Mission Control for Your Phone Agent</div>

    <div class="rule"></div>

    <div class="section-label">Authentication</div>

    <!--
      Google Sign-In button.
      data-auth-provider="google" is machine-readable — used by the auth module below.

      TO WIRE UP SUPABASE:
        1. npm install @supabase/supabase-js
        2. Replace the body of signInWithGoogle() in the script below with:
             const { error } = await supabase.auth.signInWithOAuth({ provider: 'google' })
             if (error) throw error
        3. Done. Button structure, setAuthState(), and redirect logic stay the same.
    -->
    <button
      id="google-btn"
      class="btn-google"
      data-auth-provider="google"
      onclick="signInWithGoogle()"
      aria-label="Continue with Google account"
    >
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true" focusable="false">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.705 17.64 9.2z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      <span class="btn-google-label">Continue with Google</span>
    </button>

    <div class="auth-status" id="auth-status" role="status" aria-live="polite"></div>

    <div class="footer-rule"></div>

    <div class="footer-note">
      <span>ChatterAI Private Beta</span>
      <span id="build-tag">v0.1.0</span>
    </div>
  </div>

  <script type="module">
    // -----------------------------------------------------------------------
    // Auth module — structured for a one-line Supabase swap
    // -----------------------------------------------------------------------
    //
    // SUPABASE INTEGRATION (when ready):
    //   import { createClient } from 'https://esm.sh/@supabase/supabase-js'
    //   const supabase = createClient(
    //     import.meta.env.VITE_SUPABASE_URL,
    //     import.meta.env.VITE_SUPABASE_ANON_KEY
    //   )
    //   Then inside signInWithGoogle(), replace the demo block with:
    //     const { error } = await supabase.auth.signInWithOAuth({ provider: 'google' })
    //     if (error) throw error
    //   And replace getSession() stub below with:
    //     const { data: { session } } = await supabase.auth.getSession()
    //     if (session) window.location.href = '/'
    // -----------------------------------------------------------------------

    const btn    = document.getElementById('google-btn')
    const status = document.getElementById('auth-status')

    function setAuthState(state, message = '') {
      const states = {
        idle:    { disabled: false, cls: '',        html: '' },
        loading: { disabled: true,  cls: 'loading', html: '<span class="spinner"></span>Redirecting to Google...' },
        error:   { disabled: false, cls: 'error',   html: message || 'Sign in failed. Try again.' },
      }
      const s = states[state] || states.idle
      btn.disabled      = s.disabled
      status.className  = `auth-status ${s.cls}`.trim()
      status.innerHTML  = s.html
    }

    window.signInWithGoogle = async function () {
      const provider = btn.dataset.authProvider // 'google' — passed to supabase.auth.signInWithOAuth
      setAuthState('loading')
      try {
        // SUPABASE SWAP: const { error } = await supabase.auth.signInWithOAuth({ provider })
        //                if (error) throw error; return

        // Demo redirect — replace this block entirely when wiring real auth
        await new Promise(r => setTimeout(r, 900))
        sessionStorage.setItem('chatter_authed', '1')
        sessionStorage.setItem('chatter_user_email', 'demo@chatterai.dev')
        window.location.href = '/'
      } catch (err) {
        setAuthState('error', err?.message)
      }
    }

    // Session check on load — redirect if already authenticated
    // SUPABASE SWAP: const { data: { session } } = await supabase.auth.getSession()
    //                if (session) window.location.href = '/'
    ;(function checkSession() {
      if (sessionStorage.getItem('chatter_authed')) {
        window.location.href = '/'
      }
    })()
  </script>
</body>
</html>
